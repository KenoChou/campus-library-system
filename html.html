            border: 1px solid rgba(255, 255, 255, 0.08);

            background-color: rgba(42, 42, 44, 0.4);

            border: 1px solid rgba(255, 255, 255, 0.05);

            background-color: rgba(42, 42, 44, 0.6);
        }

            border: 1px solid rgba(255, 255, 255, 0.1);

            width: 8px;
            height: 8px;

            background: rgba(255, 255, 255, 0.1);

        }

            background-size: 40px 40px;

<body class="bg-background text-on-surface font-body-md antialiased overflow-x-hidden min-h-screen flex selection:bg-primary-container selection:text-on-primary-container">

        const Sidebar = () => {

                { path: '/books', icon: 'auto_stories', label: '图书管理' },

                        {navItems.map((item) => (

                                className={`flex items-center gap-md px-md py-sm rounded-lg font-label-md text-label-md transition-all active:opacity-80 duration-150 ${

                                    : 'text-on-surface-variant hover:text-on-surface hover:bg-white/5'
                                }`}
                            >
                                <span className="material-symbols-outlined" style={{ fontVariationSettings: location.pathname === item.path ? '"FILL" 1' : '"FILL" 0' }}>{item.icon}</span>

                            </Link>
                        ))}
